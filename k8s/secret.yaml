apiVersion: v1
kind: Secret
metadata:
  name: invensys-secret
  namespace: default
  labels:
    app: invensys
type: Opaque
stringData:
  # ⚠️  JANGAN commit file ini dengan nilai asli!
  # File ini adalah TEMPLATE — isi nilai di bawah lalu simpan LOKAL saja.
  # Cara deploy: kubectl apply -f k8s/secret.yaml (setelah diisi)
  APP_KEY: ""                       # php artisan key:generate --show
  DB_USERNAME: "invensys"
  DB_PASSWORD: ""                   # ganti dengan password aman
  DB_ROOT_PASSWORD: ""              # ganti dengan password root MySQL

---
apiVersion: v1
kind: Secret
metadata:
  name: invensys-mysql-secret
  namespace: default
  labels:
    app: invensys
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: ""           # sama dengan DB_ROOT_PASSWORD di atas
  MYSQL_DATABASE: "inventory_system"
  MYSQL_USER: "invensys"
  MYSQL_PASSWORD: ""                # sama dengan DB_PASSWORD di atas
