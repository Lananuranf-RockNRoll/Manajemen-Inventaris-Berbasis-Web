apiVersion: v1
kind: ConfigMap
metadata:
  name: invensys-config
  namespace: default
  labels:
    app: invensys
data:
  APP_NAME: "InvenSys"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://invensys.local"
  DB_CONNECTION: "mysql"
  DB_HOST: "invensys-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "inventory_system"
  SESSION_DRIVER: "database"
  QUEUE_CONNECTION: "database"
  CACHE_STORE: "database"
  FILESYSTEM_DISK: "local"
  MAIL_MAILER: "log"
  MAIL_FROM_ADDRESS: "noreply@invensys.app"
  MAIL_FROM_NAME: "InvenSys"
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "error"
