version: "3.9"

# =============================================================
# InvenSys — Full Docker Stack
# Usage: docker-compose up --build
# =============================================================

services:

  # ─── MySQL 8.0 ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: invensys_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret123}
      MYSQL_DATABASE: ${DB_DATABASE:-inventory_system}
      MYSQL_USER: ${DB_USERNAME:-invensys}
      MYSQL_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - --password=${DB_ROOT_PASSWORD:-rootsecret123}
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - invensys_net

  # ─── PHP-FPM (Laravel Backend) ────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: invensys-backend:latest
    container_name: invensys_php
    restart: unless-stopped
    environment:
      APP_NAME: InvenSys
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
      MAIL_FROM_NAME: InvenSys
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - invensys_net

  # ─── Nginx (Frontend SPA + API Proxy) ─────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: invensys-nginx:latest
    container_name: invensys_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - invensys_net

  # ─── Queue Worker ─────────────────────────────────────────
  queue:
    image: invensys-backend:latest
    container_name: invensys_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3", "--memory=256"]
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - php
    networks:
      - invensys_net

  # ─── Scheduler (cron artisan) ──────────────────────────────
  scheduler:
    image: invensys-backend:latest
    container_name: invensys_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - php
    networks:
      - invensys_net

# =============================================================
volumes:
  db_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

networks:
  invensys_net:
    driver: bridge
