version: "3.9"

# =============================================================
# InvenSys — Full Docker Stack with Redis + Notifications Queue
# Usage: docker-compose up --build
# =============================================================

services:

  # ─── MySQL 8.0 ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: invensys_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret123}
      MYSQL_DATABASE: ${DB_DATABASE:-inventory_system}
      MYSQL_USER: ${DB_USERNAME:-invensys}
      MYSQL_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootsecret123}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - invensys_net

  # ─── Redis (Cache + Queue) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: invensys_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - invensys_net

  # ─── PHP-FPM (Laravel Backend) ────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: invensys-backend:latest
    container_name: invensys_php
    restart: unless-stopped
    environment:
      APP_NAME: InvenSys
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: invensys_
      # Mail — pakai SMTP Gmail (isi di .env lokal)
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
      MAIL_FROM_NAME: InvenSys
      FILESYSTEM_DISK: local
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - invensys_net

  # ─── Nginx ────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: invensys-nginx:latest
    container_name: invensys_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - invensys_net

  # ─── Queue Worker: default queue ──────────────────────────
  queue:
    image: invensys-backend:latest
    container_name: invensys_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=default,notifications", "--tries=3", "--timeout=90", "--sleep=3", "--memory=256"]
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: invensys_
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - php
      - redis
    networks:
      - invensys_net

  # ─── Scheduler ────────────────────────────────────────────
  scheduler:
    image: invensys-backend:latest
    container_name: invensys_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: invensys_
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - php
      - redis
    networks:
      - invensys_net

# =============================================================
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

networks:
  invensys_net:
    driver: bridge
