version: "3.9"

# =============================================================
# InvenSys — EC2 Production Compose
# Deploy: docker-compose -f docker-compose.ec2.yml up -d --build
#
# Port mapping (tidak conflict dengan project lain):
#   InvenSys Nginx  → host:8888  (akses via http://IP:8888)
#   MySQL           → INTERNAL ONLY (tidak expose ke host)
#   Redis           → INTERNAL ONLY (tidak expose ke host)
#
# Proyek lain yang sudah jalan:
#   ecommerce  → 3000 (fe), 8080 (be), 5432 (db)
#   school     → 5174 (fe), 3001 (be)
# =============================================================

services:

  # ─── MySQL 8.0 (internal only, no host port) ─────────────
  db:
    image: mysql:8.0
    container_name: invensys_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret123}
      MYSQL_DATABASE: ${DB_DATABASE:-inventory_system}
      MYSQL_USER: ${DB_USERNAME:-invensys}
      MYSQL_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
    volumes:
      - invensys_db_data:/var/lib/mysql
    # ⚠️ NO ports: section — MySQL tidak di-expose ke host
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootsecret123}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - invensys_net

  # ─── Redis 7 (internal only, no host port) ────────────────
  redis:
    image: redis:7-alpine
    container_name: invensys_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - invensys_redis_data:/data
    # ⚠️ NO ports: section — Redis tidak di-expose ke host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - invensys_net

  # ─── PHP-FPM (Laravel Backend) ────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: invensys-backend:latest
    container_name: invensys_php
    restart: unless-stopped
    environment:
      APP_NAME: InvenSys
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8888}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: invensys_
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
      MAIL_FROM_NAME: InvenSys
      FILESYSTEM_DISK: local
    volumes:
      - invensys_storage:/var/www/html/storage/app
      - invensys_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - invensys_net

  # ─── Nginx (port 8888 — tidak conflict) ───────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: invensys-nginx:latest
    container_name: invensys_nginx
    restart: unless-stopped
    ports:
      - "8888:80"    # ← hanya ini yang expose ke host
    depends_on:
      - php
    networks:
      - invensys_net

  # ─── Queue Worker ──────────────────────────────────────────
  queue:
    image: invensys-backend:latest
    container_name: invensys_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=default,notifications", "--tries=3", "--timeout=90", "--sleep=3", "--memory=128"]
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: invensys_
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
    volumes:
      - invensys_storage:/var/www/html/storage/app
      - invensys_logs:/var/www/html/storage/logs
    depends_on:
      - php
      - redis
    networks:
      - invensys_net

  # ─── Scheduler ────────────────────────────────────────────
  scheduler:
    image: invensys-backend:latest
    container_name: invensys_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventory_system}
      DB_USERNAME: ${DB_USERNAME:-invensys}
      DB_PASSWORD: ${DB_PASSWORD:-invensys_pass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: invensys_
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@invensys.app}
    volumes:
      - invensys_storage:/var/www/html/storage/app
      - invensys_logs:/var/www/html/storage/logs
    depends_on:
      - php
      - redis
    networks:
      - invensys_net

# =============================================================
# Semua volume dan network pakai prefix "invensys_"
# agar tidak conflict dengan project ecommerce/school
# =============================================================
volumes:
  invensys_db_data:
    driver: local
  invensys_redis_data:
    driver: local
  invensys_storage:
    driver: local
  invensys_logs:
    driver: local

networks:
  invensys_net:
    driver: bridge
    name: invensys_net   # explicit name agar tidak auto-prefixed
